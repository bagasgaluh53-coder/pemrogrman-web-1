<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penilaian Siswa</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f806d0, #e72ce7);
        }

        .container{
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(197, 6, 6, 0.3);
        }

        h1{
            margin-bottom: 20px;
            color: #c81313;
        }

        input{
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
        }

        button{
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #5a67d8;
        }

        .hasil{
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .lulus{
            background: #d4edda;
            color: #e85cc1;
        }

        .gagal{
            background: #f8d7da;
            color: #721c24;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Sistem Penilaian</h1>

        <input type="text" id="nama" placeholder="Masukkan nama siswa">

        <input type="number" id="nilai" placeholder="Masukkan nilai">

        <button onclick="cekHasil()">
            Cek Hasil
        </button>

        <div id="hasil" class="hasil"></div>

    </div>

    <script src="scriptt.js"></script>

</body>
</html>
